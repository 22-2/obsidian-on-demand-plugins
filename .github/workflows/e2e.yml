name: E2E Tests

on:
    push: {}
    pull_request: {}
    workflow_dispatch:
        inputs:
            obsidian_version:
                description: "Obsidian release version (e.g. 1.12.4). Use latest for latest release."
                required: false
                default: "latest"

defaults:
    run:
        shell: bash

jobs:
    e2e:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [macos-latest, windows-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: "10"

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "24.x"
                  cache: "pnpm"
                  cache-dependency-path: pnpm-lock.yaml

            - name: Read Obsidian version from versions.json
              id: set-version
              run: |
                  node -e '
                    const fs = require("fs");
                    const ver = JSON.parse(fs.readFileSync("versions.json", "utf8")).obsidian || "latest";
                    fs.appendFileSync(process.env.GITHUB_OUTPUT, `obsidian_version=${ver}\n`);
                  '

            - name: Cache plugin downloads
              uses: actions/cache@v5
              with:
                  path: myfiles
                  key: ${{ runner.os }}-myfiles-${{ hashFiles('tests/plugin-sources.json') }}
                  restore-keys: |
                      ${{ runner.os }}-myfiles-

            - name: Cache toolkit assets
              uses: actions/cache@v5
              with:
                  path: obsidian-e2e-toolkit-assets
                  key: >-
                      ${{ runner.os }}-obsidians-e2e-toolkit-v4-${{
                        github.event_name == 'workflow_dispatch'
                        && github.event.inputs.obsidian_version
                        || steps.set-version.outputs.obsidian_version
                        || 'latest'
                      }}
                  restore-keys: |
                      ${{ runner.os }}-obsidians-e2e-toolkit-v4-

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: .cache/ms-playwright
                  key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-chromium-

            - name: Install dependencies
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
                  pnpm install --no-frozen-lockfile

            - name: Install Playwright chromium
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              env:
                  PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
              run: pnpm exec playwright install chromium

            - name: Build plugin under test
              run: pnpm run build

            - name: Ensure toolkit Obsidian is installed
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  OBSIDIAN_E2E_TOOLKIT_HOME: ${{ github.workspace }}
                  OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: >-
                      ${{
                        github.event_name == 'workflow_dispatch'
                        && github.event.inputs.obsidian_version
                        || steps.set-version.outputs.obsidian_version
                        || 'latest'
                      }}
              run: node node_modules/obsidian-e2e-toolkit/scripts/setup.mjs

            - name: Run E2E tests
              env:
                  CI: true
                  PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
              run: pnpm run test:e2e

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report-${{ matrix.os }}
                  path: playwright-report
